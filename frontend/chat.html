<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时金价查询</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .chat-container { border: 1px solid #ddd; border-radius: 8px; padding: 20px; height: 600px; overflow-y: auto; margin-bottom: 20px; }
        .message { margin: 10px 0; padding: 10px; border-radius: 6px; max-width: 80%; }
        .user-message { background: #007bff; color: white; margin-left: auto; }
        .bot-message { background: #f1f1f1; color: #333; margin-right: auto; }
        .typing { color: #666; font-style: italic; }
        .input-area { display: flex; gap: 10px; }
        #message-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        #send-btn, #refresh-btn { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #refresh-btn { background: #28a745; }
        .warning { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
    <h1>实时金价查询工具</h1>
    <div class="chat-container" id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="message-input" placeholder="输入问题（如：当前金价是多少？）">
        <button id="send-btn">发送</button>
        <button id="refresh-btn">🔄 刷新最新金价</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const refreshBtn = document.getElementById('refresh-btn');

        // 添加消息到聊天窗口
        function addMessage(text, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = isUser ? 'message user-message' : 'message bot-message';

            // 解析警告信息并高亮
            if (text.includes('⚠️')) {
                text = text.replace('⚠️', '<span class="warning">⚠️</span>');
                messageDiv.innerHTML = text;
            } else {
                messageDiv.textContent = text;
            }

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 显示/隐藏正在输入
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing';
            typingDiv.className = 'typing';
            typingDiv.textContent = '正在查询最新金价...';
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTyping() {
            const typingDiv = document.getElementById('typing');
            if (typingDiv) typingDiv.remove();
        }

        // 发送消息请求
        async function sendMessage(content) {
            if (!content.trim()) return;

            // 添加用户消息
            addMessage(content, true);
            messageInput.value = '';

            // 显示加载状态
            showTyping();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [{ role: 'user', content }] })
                });

                const data = await response.json();

                // 隐藏加载状态并显示结果
                hideTyping();
                addMessage(data.reply || '查询失败，请稍后重试');
            } catch (error) {
                // 修复：error.message 拼写错误（原错误为error.Message）
                hideTyping();
                console.error('请求失败:', error);
                addMessage(`⚠️ 请求失败：${error.message}`);
            }
        }

        // 刷新最新金价
        function refreshGoldData() {
            sendMessage('刷新最新金价');
        }

        // 绑定事件
        sendBtn.addEventListener('click', () => sendMessage(messageInput.value));
        refreshBtn.addEventListener('click', refreshGoldData);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage(messageInput.value);
        });

        // 初始化欢迎语
        addMessage('你好！我可以为你查询实时国际金价（XAU/USD），包括当前价格、24小时高低点、RSI和MACD指标。');
    </script>
</body>
</html>
