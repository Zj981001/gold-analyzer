<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>黄金AI分析师</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
    }
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #e4edf9 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    .container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    header {
      text-align: center;
      padding: 20px 0;
    }
    h1 {
      font-size: 1.8rem;
      color: #2c3e50;
      font-weight: 700;
    }
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 85%;
      padding: 14px;
      border-radius: 18px;
      line-height: 1.5;
      position: relative;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .user {
      background: #4A90E2;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 5px;
    }
    .bot {
      background: white;
      color: #333;
      align-self: flex-start;
      border-bottom-left-radius: 5px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .input-area {
      display: flex;
      gap: 10px;
      padding: 15px 0;
      border-top: 1px solid #eee;
    }
    #user-input {
      flex: 1;
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }
    #user-input:focus {
      border-color: #4A90E2;
    }
    #send-btn {
      background: #4A90E2;
      color: white;
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }
    #send-btn:hover {
      background: #357ABD;
    }
    .typing {
      color: #666;
      font-style: italic;
    }
    @media (max-width: 480px) {
      h1 { font-size: 1.5rem; }
      .message { padding: 12px; font-size: 0.95rem; }
    }
  </style>
  <!-- PWA 支持 -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4A90E2">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <!-- 注册 Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .catch(console.error);
      });
    }
  </script>
</head>
<body>
  <div class="container">
    <header>
      <h1>💰 黄金AI分析师</h1>
    </header>
    <div id="chat-box" class="chat-box">
      <div class="message bot">你好！我是黄金市场AI助手，请问你想了解国际金价（XAU/USD）的什么信息？</div>
    </div>
    <div class="input-area">
      <input type="text" id="user-input" placeholder="输入问题，例如：现在金价多少？" />
      <button id="send-btn">➤</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function addMessage(text, isUser = false) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${isUser ? 'user' : 'bot'}`;
      msgDiv.textContent = text;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping() {
      const typingDiv = document.createElement('div');
      typingDiv.className = 'message bot typing';
      typingDiv.id = 'typing-indicator';
      typingDiv.textContent = '🤖 正在分析金价...';
      chatBox.appendChild(typingDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function hideTyping() {
      const indicator = document.getElementById('typing-indicator');
      if (indicator) indicator.remove();
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      addMessage(text, true);
      userInput.value = '';
      showTyping();

      try {
        // ✅ 关键修复：完整 headers + 正确 body
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({
            messages: [
              { role: "user", content: text }
            ]
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        hideTyping();
        addMessage(data.reply || '抱歉，我无法回答这个问题。');
      } catch (error) {
        console.error("请求失败:", error);
        hideTyping();
        addMessage('⚠️ 请求失败：' + error.Message);
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
